# Render Blueprint — https://render.com/docs/blueprint-spec
# Defines the backend API service. Frontend and database are
# created separately via the Render dashboard (2 clicks each).

services:
  - type: web
    name: shopease-api
    runtime: node
    repo: https://github.com/aditya-gautam912/Shopease-fullstack
    rootDir: shopease-backend/shopease-backend
    buildCommand: npm install
    startCommand: bash startup.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        value: https://shopease-store.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: shopease-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CSRF_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false

databases:
  - name: shopease-db
    databaseName: shopease
    plan: free
    ipAllowList: []
